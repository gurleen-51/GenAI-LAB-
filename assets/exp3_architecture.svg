<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1" />
    </marker>
  </defs>
  
  <rect width="600" height="400" fill="#0f172a" rx="15" />
  
  <!-- Input Layer -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="80" height="200" fill="#1e293b" stroke="#334155" stroke-width="2" rx="5" />
    <text x="40" y="-10" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Input (784)</text>
    <circle cx="40" cy="40" r="10" fill="#475569" />
    <circle cx="40" cy="80" r="10" fill="#475569" />
    <circle cx="40" cy="120" r="4" fill="#475569" />
    <circle cx="40" cy="130" r="4" fill="#475569" />
    <circle cx="40" cy="140" r="4" fill="#475569" />
    <circle cx="40" cy="180" r="10" fill="#475569" />
  </g>
  
  <!-- Hidden Layer -->
  <g transform="translate(250, 50)">
    <rect x="0" y="0" width="100" height="300" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2" rx="10" />
    <text x="50" y="-10" fill="#dbeafe" font-family="Arial" font-size="12" text-anchor="middle">Hidden (128) - ReLU</text>
    <circle cx="50" cy="60" r="12" fill="#3b82f6" />
    <circle cx="50" cy="110" r="12" fill="#3b82f6" />
    <circle cx="50" cy="240" r="12" fill="#3b82f6" />
  </g>
  
  <!-- Output Layer -->
  <g transform="translate(470, 100)">
    <rect x="0" y="0" width="80" height="200" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" rx="5" />
    <text x="40" y="-10" fill="#fecaca" font-family="Arial" font-size="12" text-anchor="middle">Output (10)</text>
    <circle cx="40" cy="40" r="10" fill="#ef4444" />
    <circle cx="40" cy="100" r="10" fill="#ef4444" />
    <circle cx="40" cy="160" r="10" fill="#ef4444" />
  </g>
  
  <!-- Connections -->
  <line x1="130" y1="200" x2="245" y2="200" stroke="#cbd5e1" stroke-width="1" marker-end="url(#arrowhead)" />
  <line x1="350" y1="200" x2="465" y2="200" stroke="#cbd5e1" stroke-width="1" marker-end="url(#arrowhead)" />
  
  <text x="190" y="190" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Weights</text>
  <text x="410" y="190" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Softmax</text>
</svg>
