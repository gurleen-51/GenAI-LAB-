<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="#0f172a" rx="15" />
  
  <!-- Latent Noise -->
  <rect x="50" y="160" width="80" height="80" fill="#1e293b" stroke="#334155" stroke-width="2" rx="10" />
  <text x="90" y="200" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">Latent (z)</text>
  
  <!-- Generator -->
  <rect x="180" y="150" width="120" height="100" fill="#4c1d95" stroke="#7c3aed" stroke-width="2" rx="10" />
  <text x="240" y="205" fill="#f5f3ff" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Generator</text>
  
  <!-- Fake Data -->
  <rect x="350" y="220" width="80" height="50" fill="#1e293b" stroke="#334155" stroke-width="2" rx="5" />
  <text x="390" y="250" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Fake G(z)</text>
  
  <!-- Real Data -->
  <rect x="350" y="130" width="80" height="50" fill="#064e3b" stroke="#059669" stroke-width="2" rx="5" />
  <text x="390" y="160" fill="#d1fae5" font-family="Arial" font-size="12" text-anchor="middle">Real Data</text>
  
  <!-- Discriminator -->
  <rect x="480" y="150" width="100" height="100" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" rx="10" />
  <text x="530" y="205" fill="#fef2f2" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Discriminator</text>
  
  <!-- Arrows -->
  <line x1="130" y1="200" x2="170" y2="200" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 300 200 Q 325 200 350 245" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 300 200 Q 325 200 350 155" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="430" y1="155" x2="470" y2="185" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="430" y1="245" x2="470" y2="215" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Feedback Loop -->
  <path d="M 530 150 Q 530 50 240 50 Q 240 140 240 140" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
  <text x="385" y="40" fill="#a78bfa" font-family="Arial" font-size="12" text-anchor="middle">Loss Gradient (G Update)</text>
</svg>
