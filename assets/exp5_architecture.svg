<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1" />
    </marker>
  </defs>
  
  <rect width="600" height="400" fill="#0f172a" rx="15" />
  
  <!-- Latent Z -->
  <rect x="50" y="150" width="100" height="100" fill="#1e293b" stroke="#334155" stroke-width="2" rx="10" />
  <circle cx="100" cy="200" r="30" fill="#3b82f6" opacity="0.3" />
  <text x="100" y="205" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">Latent Z</text>
  
  <!-- Flow Block -->
  <rect x="220" y="130" width="160" height="140" fill="#064e3b" stroke="#059669" stroke-width="2" rx="10" />
  <text x="300" y="160" fill="#d1fae5" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">Flow Bijector</text>
  <rect x="240" y="180" width="120" height="30" fill="#1e293b" stroke="#334155" stroke-width="1" rx="5" />
  <text x="300" y="200" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">det |∂f/∂z|</text>
  <text x="300" y="240" fill="#d1fae5" font-family="Arial" font-size="12" text-anchor="middle">Invertible layers</text>
  
  <!-- Data X -->
  <rect x="450" y="150" width="100" height="100" fill="#1e293b" stroke="#334155" stroke-width="2" rx="10" />
  <path d="M 470 230 Q 500 170 530 230" fill="none" stroke="#f43f5e" stroke-width="2" />
  <text x="500" y="205" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">Data X</text>
  
  <!-- Arrows -->
  <path d="M 155 180 L 215 180" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="185" y="170" fill="#3b82f6" font-family="Arial" font-size="10" text-anchor="middle">Forward</text>
  
  <path d="M 215 220 L 155 220" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="185" y="240" fill="#f43f5e" font-family="Arial" font-size="10" text-anchor="middle">Inverse</text>
  
  <path d="M 385 180 L 445 180" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)" />
  <path d="M 445 220 L 385 220" stroke="#f43f5e" stroke-width="2" marker-end="url(#arrowhead)" />
</svg>
