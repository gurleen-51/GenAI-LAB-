<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#0f172a" rx="15" />
  
  <text x="300" y="40" fill="#f8fafc" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">GAN Training Stability Comparison</text>
  
  <!-- Stability Axis -->
  <line x1="100" y1="350" x2="500" y2="350" stroke="#475569" stroke-width="2" />
  <line x1="100" y1="350" x2="100" y2="100" stroke="#475569" stroke-width="2" />
  <text x="80" y="225" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle" transform="rotate(-90 80 225)">Stability Index</text>
  
  <!-- Standard BCE (Oscillating/Failing) -->
  <path d="M 120 300 L 140 150 L 160 320 L 180 100 L 200 340 L 220 50" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.6" />
  <text x="170" y="370" fill="#ef4444" font-family="Arial" font-size="12" text-anchor="middle">Standard BCE (Unstable)</text>
  
  <!-- WGAN-GP (Smooth Convergence) -->
  <path d="M 120 340 Q 300 200 500 150" fill="none" stroke="#22c55e" stroke-width="4" />
  <text x="430" y="130" fill="#22c55e" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">WGAN-GP (Stable)</text>
  
  <rect x="350" y="250" width="200" height="80" fill="#1e293b" stroke="#334155" stroke-width="1" rx="5" />
  <text x="450" y="275" fill="#94a3b8" font-family="Arial" font-size="10" text-anchor="middle">Lipschitz Constraint via</text>
  <text x="450" y="295" fill="#f8fafc" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Gradient Penalty (GP)</text>
</svg>
