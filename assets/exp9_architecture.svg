<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1" />
    </marker>
  </defs>
  
  <rect width="600" height="400" fill="#0f172a" rx="15" />
  
  <!-- Image Grid -->
  <g transform="translate(100, 100)">
    <rect x="0" y="0" width="120" height="120" fill="none" stroke="#334155" stroke-width="1" />
    <line x1="40" y1="0" x2="40" y2="120" stroke="#334155" />
    <line x1="80" y1="0" x2="80" y2="120" stroke="#334155" />
    <line x1="0" y1="40" x2="120" y2="40" stroke="#334155" />
    <line x1="0" y1="80" x2="120" y2="80" stroke="#334155" />
    
    <!-- Masked Pixels (Known) -->
    <rect x="0" y="0" width="120" height="40" fill="#1e3a8a" opacity="0.6" />
    <rect x="0" y="40" width="40" height="40" fill="#1e3a8a" opacity="0.6" />
    
    <!-- Target Pixel -->
    <rect x="40" y="40" width="40" height="40" fill="#f43f5e" />
    <text x="60" y="65" fill="white" font-family="Arial" font-size="10" text-anchor="middle">?</text>
  </g>
  
  <text x="160" y="80" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">Causal Context</text>
  
  <!-- Masked Conv -->
  <rect x="300" y="150" width="120" height="80" fill="#1e293b" stroke="#7c3aed" stroke-width="2" rx="10" />
  <text x="360" y="195" fill="#f5f3ff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Masked Conv</text>
  
  <!-- Sequential Output -->
  <rect x="480" y="150" width="60" height="80" fill="#064e3b" stroke="#059669" stroke-width="2" rx="5" />
  <text x="510" y="195" fill="#d1fae5" font-family="Arial" font-size="12" text-anchor="middle">Pixel P_i</text>
  
  <!-- Arrows -->
  <line x1="230" y1="160" x2="295" y2="180" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="420" y1="190" x2="475" y2="190" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <text x="360" y="260" fill="#94a3b8" font-family="Arial" font-size="12" text-anchor="middle">Zeros out 'future' pixels</text>
</svg>
